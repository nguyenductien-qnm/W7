AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: StudyBot backend (Lambda + API Gateway + DynamoDB)

Globals:
  Function:
    Runtime: python3.9
    Timeout: 30
    MemorySize: 256

Resources:
  StudyBotApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowOrigins:
          - "*"

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StudyBotDocuments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  StudyBotFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          AWS_REGION: ap-southeast-1
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
      Events:
        LoginApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /login
            Method: POST
        UploadApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /upload
            Method: POST
        DocumentsListApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /documents
            Method: GET
        DocumentDetailApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /documents/{doc_id}
            Method: GET
        DocumentStatusApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /documents/{doc_id}/status
            Method: GET
        AskApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /ask
            Method: POST
        QuizApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /quiz
            Method: POST
        DashboardApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /dashboard
            Method: GET

Outputs:
  ApiUrl:
    Description: API endpoint URL
    Value: !Sub "https://${StudyBotApi}.execute-api.${AWS::Region}.amazonaws.com"
