AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: StudyBot backend (Lambda + API Gateway + DynamoDB)

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256

Resources:
  StudyBotApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowHeaders:
          - Content-Type
          - Authorization
          - X-User-Id
          - X-Session-Id
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowOrigins:
          - "*"

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: StudyBotDocuments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: auth.login_lambda.lambda_handler
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          UPLOADS_BUCKET_NAME: studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
      Events:
        LoginApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /login
            Method: POST

  SessionsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: session.sessions_lambda.lambda_handler
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          UPLOADS_BUCKET_NAME: studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
      Events:
        SessionCreateApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /session/create
            Method: POST
        SessionListApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /session/list
            Method: GET
        SessionDeleteApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /session/{session_id}
            Method: DELETE

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: upload.upload_lambda.lambda_handler
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          UPLOADS_BUCKET_NAME: studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
              Resource:
                - arn:aws:s3:::studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk/raw/*
                - arn:aws:s3:::studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk/documents/*
      Events:
        UploadApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /upload
            Method: POST
        UploadPresignApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /upload/presign
            Method: POST
        DocumentsUploadUrlApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /documents/upload-url
            Method: POST
        DocumentCompleteApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /documents/{doc_id}/complete
            Method: POST

  DocumentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: documents.documents_lambda.lambda_handler
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          UPLOADS_BUCKET_NAME: studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:GetIngestionJob
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:knowledge-base/LI32IWLOB5
                - arn:aws:bedrock:ap-southeast-1:589077667575:knowledge-base/LI32IWLOB5/data-source/V0ISBKEMXT
      Events:
        DocsListAliasApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /docs/list
            Method: GET

  QaFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: qa.qa_lambda.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
          UPLOADS_BUCKET_NAME: studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk
          AGENTCORE_MEMORY_ID: ""
          AGENTCORE_MEMORY_STRATEGY_ID: ""
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:Retrieve
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:knowledge-base/LI32IWLOB5
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:inference-profile/global.amazon.nova-2-lite-v1:0
                - arn:aws:bedrock:*::foundation-model/amazon.nova-2-lite-v1:0
            - Effect: Allow
              Action:
                - bedrock-agentcore:CreateEvent
                - bedrock-agentcore:RetrieveMemoryRecords
              Resource: "*"
      Events:
        AskApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /ask
            Method: POST

  SummaryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: summary.summary_lambda.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
          UPLOADS_BUCKET_NAME: studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource:
                - arn:aws:s3:::studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk/processed/*
                - arn:aws:s3:::studybotdatastack-uploadbucketd2c1da78-2cpeowy02vjk/documents/processed/*
            - Effect: Allow
              Action:
                - bedrock:Retrieve
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:knowledge-base/LI32IWLOB5
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:inference-profile/global.amazon.nova-2-lite-v1:0
                - arn:aws:bedrock:*::foundation-model/amazon.nova-2-lite-v1:0
      Events:
        SummaryApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /summary
            Method: POST

  QuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: quiz.quiz_lambda.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:Retrieve
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:knowledge-base/LI32IWLOB5
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:inference-profile/global.amazon.nova-2-lite-v1:0
                - arn:aws:bedrock:*::foundation-model/amazon.nova-2-lite-v1:0
      Events:
        QuizApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /quiz
            Method: POST

  PlannerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: planner.planner_lambda.lambda_handler
      Timeout: 60
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
          AGENTCORE_MEMORY_ID: ""
          AGENTCORE_MEMORY_STRATEGY_ID: ""
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DocumentsTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:Retrieve
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:knowledge-base/LI32IWLOB5
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource:
                - arn:aws:bedrock:ap-southeast-1:589077667575:inference-profile/global.amazon.nova-2-lite-v1:0
                - arn:aws:bedrock:*::foundation-model/amazon.nova-2-lite-v1:0
            - Effect: Allow
              Action:
                - bedrock-agentcore:CreateEvent
                - bedrock-agentcore:RetrieveMemoryRecords
              Resource: "*"
      Events:
        PlannerApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner
            Method: POST
        PlannerClarifyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner/clarify
            Method: POST
        PlannerListApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner
            Method: GET
        PlannerDetailApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner/{plan_id}
            Method: GET
        PlannerUpdateApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner/{plan_id}
            Method: PUT
        PlannerPatchApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner/{plan_id}
            Method: PATCH
        PlannerDeleteApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner/{plan_id}
            Method: DELETE
        PlannerRecommendDocsApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /planner/{plan_id}/recommend-docs
            Method: POST

  HistoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: history.history_lambda.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          DOCUMENTS_TABLE: !Ref DocumentsTable
          INGESTION_MODE: mock
          BEDROCK_KNOWLEDGE_BASE_ID: LI32IWLOB5
          BEDROCK_DATA_SOURCE_ID: V0ISBKEMXT
          BEDROCK_GENERATION_MODEL_ID: global.amazon.nova-2-lite-v1:0
          VECTOR_INDEX_ARN: arn:aws:s3vectors:ap-southeast-1:589077667575:bucket/studybot-vectors-589077667575-ap-southeast-1/index/studybot-kb-index
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref DocumentsTable
      Events:
        HistoryApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /history
            Method: GET
        DashboardApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref StudyBotApi
            Path: /dashboard
            Method: GET

Outputs:
  ApiUrl:
    Description: API endpoint URL
    Value: !Sub "https://${StudyBotApi}.execute-api.${AWS::Region}.amazonaws.com"
